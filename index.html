<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Lobster&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Bungee+Shade&display=swap" rel="stylesheet">
<title>Cut It Out</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}


body{
    margin: 0;
      font-family: Arial, sans-serif;
      background: url("cut2.jpg") no-repeat center center/cover;
  
      /* ✅ Mobile-friendly layout */
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 15px;
      box-sizing: border-box;
    color:rgb(120, 127, 139);
}


.container{
    width:90%;
    max-width:700px;
    text-align:center;
}


/* Logo */

.logo{

font-family: 'Permanent Marker', cursive;

font-size:72px;

color:#22c55e;

letter-spacing:3px;

text-shadow:
    -3px -3px 0 #000,
     3px -3px 0 #000,
    -3px  3px 0 #000,
     3px  3px 0 #000,
     0px  6px 12px rgba(0,0,0,.5);

margin-bottom:40px;

user-select:none;

}

.scissors{
    display:inline-block;
    animation:cut 2s infinite;
}


@keyframes cut{

    0%{
        transform:translateX(-80px) rotate(-20deg);
    }

    50%{
        transform:translateX(0px) rotate(10deg);
    }

    100%{
        transform:translateX(-80px) rotate(-20deg);
    }

}



/* Upload box */


.drop-zone{

    height:350px;
    border:3px dashed #22c55e;
    border-radius:25px;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    background:#1e293b;

    transition:.3s;
}


.drop-zone:hover{

    transform:scale(1.02);
    background:#263449;

}


.drop-zone p{

    font-size:22px;
    margin-bottom:20px;

}



label{

padding:15px 35px;
border:none;
border-radius:30px;

background:#22c55e;
color:white;

font-size:18px;
cursor:pointer;

transition:.3s;

display:inline-block;

}


label:hover{

background:#16a34a;

}



input{

    display:none;

}



.preview{

    margin-top:30px;

}


.preview img{

    max-width:300px;
    border-radius:15px;

}


</style>

</head>


<body>


<div class="container">


    <div class="logo">

        Cut <span class="scissors">✂</span> It Out

    </div>


    <div class="drop-zone" id="dropZone">


        <p>
            Drag & Drop your image here
        </p>


        <input type="file" id="fileInput" accept="image/*">

<label for="fileInput">
    Choose Image
</label>

    </div>



    <div class="preview" id="preview"></div>


</div>

<script type="module">
    import { removeBackground } from 
    "https://cdn.jsdelivr.net/npm/@imgly/background-removal/+esm";
    
    
    window.removeBackground = removeBackground;
    
    </script>

<script>


const dropZone = document.getElementById("dropZone");
const fileInput = document.getElementById("fileInput");
const preview = document.getElementById("preview");


fileInput.addEventListener("change", function(){
    processImage(this.files[0]);
});


dropZone.addEventListener("dragover", (e)=>{
    e.preventDefault();
});


dropZone.addEventListener("drop", (e)=>{

    e.preventDefault();

    const file = e.dataTransfer.files[0];

    processImage(file);

});



async function processImage(file){

    if(!file || !file.type.startsWith("image/")){

        alert("Please upload an image");

        return;

    }


    preview.innerHTML = `

    <h3>Analyzing image...</h3>

    <p>✂ Cutting out background...</p>

    `;


    try {


        // AI removes background

        const result = await removeBackground(file);


        // Convert AI result into image URL

        const imageURL = URL.createObjectURL(result);



        preview.innerHTML = `

        <h3>Completed ✅</h3>

        <p>Your cut out image:</p>


        <img src="${imageURL}" 
        style="
        max-width:300px;
        border-radius:15px;
        ">


        <br><br>


        <a href="${imageURL}" download="cut-it-out.png">

            <button>
                Download PNG
            </button>

        </a>

        `;



    } catch(error){


        console.error(error);


        preview.innerHTML = `

        <h3>Error ❌</h3>

        <p>
        Could not process image.
        </p>

        `;


    }


}

</script>


</body>
</html>
